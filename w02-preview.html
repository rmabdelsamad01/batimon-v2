<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background:#1a2a3a; display:flex; align-items:center; justify-content:center; gap:40px; height:100vh; margin:0; font-family:monospace; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .group-label { color:#8099b0; font-size:10px; text-align:center; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
  .pair { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .sub-label { color:#556070; font-size:9px; text-align:center; letter-spacing:0.08em; text-transform:uppercase; }
  .cell { width:60px; height:150px; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:stretch; padding:0; border-radius:4px; background:#d9a0a0; }
  .spandrel { width:100%; height:50px; flex-shrink:0; background-image:radial-gradient(circle,rgba(0,0,0,0.55) 1px,transparent 1px); background-size:5px 5px; border-bottom:1px solid rgba(0,0,0,0.2); }
  .glass { width:100%; flex:1; position:relative; overflow:hidden; }
  svg { display:block; position:absolute; top:0; left:0; width:100%; height:100%; }
  .tag { position:absolute; bottom:0; left:0; right:0; height:25px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#1a2a3a; z-index:2; letter-spacing:0.03em; }
</style>
</head>
<body>

<script>
  /* SVG innards */
  const OLD_SVG = `
    <rect x="1" y="1" width="48" height="98" fill="none" stroke="#2a3a52" stroke-width="3.5"/>
    <rect x="1" y="75" width="48" height="24" fill="rgba(0,0,0,0.18)"/>
    <rect x="1" y="75" width="48" height="24" fill="none" stroke="#2a3a52" stroke-width="1.5"/>
    <line x1="3" y1="77" x2="47" y2="77" stroke="#2a3a52" stroke-width="0.8" opacity="0.35"/>
    <rect x="6" y="8" width="38" height="62" fill="none" stroke="#2a3a52" stroke-width="2.5"/>
    <rect x="7.5" y="9.5" width="35" height="59" fill="rgba(255,255,255,0.35)"/>
    <line x1="42.5" y1="9.5" x2="7.5" y2="39" stroke="#2a3a52" stroke-width="1.1" opacity="0.6"/>
    <line x1="42.5" y1="68.5" x2="7.5" y2="39" stroke="#2a3a52" stroke-width="1.1" opacity="0.6"/>`;

  const NEW_SVG = `
    <rect x="1" y="1" width="48" height="98" fill="none" stroke="#2a3a52" stroke-width="2"/>
    <rect x="1" y="75" width="48" height="24" fill="rgba(0,0,0,0.18)"/>
    <rect x="1" y="75" width="48" height="24" fill="none" stroke="#2a3a52" stroke-width="1.5"/>
    <line x1="3" y1="77" x2="47" y2="77" stroke="#2a3a52" stroke-width="0.8" opacity="0.35"/>
    <rect x="1" y="1" width="48" height="74" fill="rgba(255,255,255,0.45)"/>
    <line x1="1" y1="1" x2="25" y2="75" stroke="#2a3a52" stroke-width="2" opacity="0.6"/>
    <line x1="49" y1="1" x2="25" y2="75" stroke="#2a3a52" stroke-width="2" opacity="0.6"/>`;

  /* border styles per type */
  const BORDERS = {
    W01: '',
    W02: 'border-bottom:5px double #ED1C24;',
    W03: 'border-left:5px double #ED1C24;',
    W04: 'border-bottom:5px double #ED1C24;border-left:5px double #ED1C24;'
  };

  function makeCell(type, svgContent) {
    const border = BORDERS[type];
    return `
      <div class="pair">
        <div class="cell" style="${border}">
          <div class="spandrel"></div>
          <div class="glass">
            <svg viewBox="0 0 50 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              ${svgContent}
            </svg>
            <div class="tag">${type}</div>
          </div>
        </div>
      </div>`;
  }

  const types = ['W01','W02','W03','W04'];

  let html = '';
  // Current column
  html += '<div class="col"><div class="group-label">Current</div>';
  types.forEach(t => { html += makeCell(t, OLD_SVG); });
  html += '</div>';
  // New column
  html += '<div class="col"><div class="group-label">New</div>';
  types.forEach(t => { html += makeCell(t, NEW_SVG); });
  html += '</div>';

  document.write(html);
</script>

</body>
</html>
