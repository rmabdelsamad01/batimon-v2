<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batimon — 3D Demo View</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0d1117; }
#canvas-wrap { position:fixed; inset:0; }
#canvas-wrap canvas { width:100%!important; height:100%!important; display:block; }

#top-bar {
  position:fixed; top:0; left:0; right:0; height:46px; z-index:20;
  background:#161b22cc; border-bottom:1px solid #30363d; backdrop-filter:blur(10px);
  display:flex; align-items:center; padding:0 14px; gap:10px;
}
#top-title { font-size:13px; font-weight:700; color:#e6edf3; display:flex; align-items:center; gap:7px; flex:1; }
#close-btn {
  background:#21262d; border:1px solid #30363d; color:#c9d1d9;
  font-size:12px; height:28px; padding:0 14px; border-radius:6px; cursor:pointer;
  font-weight:600; transition:all .15s;
}
#close-btn:hover { background:#30363d; color:#fff; }

#legend-panel {
  position:fixed; top:60px; right:14px; z-index:10;
  background:#161b22e8; border:1px solid #30363d; border-radius:10px;
  padding:11px 14px; max-height:calc(100vh - 90px); overflow-y:auto;
  min-width:160px; max-width:210px; backdrop-filter:blur(8px); display:none;
}
#legend-panel::-webkit-scrollbar { width:4px; }
#legend-panel::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }
.leg-hd { font-size:9px; font-weight:700; color:#8b949e; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.leg-dot { width:11px; height:11px; border-radius:2px; flex-shrink:0; }
.leg-lbl { font-size:11px; color:#c9d1d9; font-weight:500; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.leg-cnt { font-size:10px; color:#8b949e; flex-shrink:0; font-variant-numeric:tabular-nums; }

#hint {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%); z-index:10;
  font-size:10px; color:#484f58; background:#161b22cc; border:1px solid #21262d;
  padding:3px 14px; border-radius:20px; white-space:nowrap; pointer-events:none;
  backdrop-filter:blur(6px);
}
#loading {
  position:fixed; inset:0; background:#0d1117; z-index:50;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
.spin { width:32px; height:32px; border:3px solid #21262d; border-top-color:#a855f7; border-radius:50%; animation:sp .75s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }
.load-txt { font-size:12px; color:#484f58; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="loading"><div class="spin"></div><div class="load-txt">Building 3D view…</div></div>
<div id="canvas-wrap"></div>
<div id="top-bar">
  <div id="top-title">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    Demo — 3D View
  </div>
  <button id="close-btn" onclick="window._close3D()">✕ Close</button>
</div>
<div id="legend-panel">
  <div class="leg-hd">Legend</div>
  <div id="leg-items"></div>
</div>
<div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

window._close3D = () => window.parent.postMessage({ type:'demo3d-close' }, '*');
window.parent.postMessage({ type:'demo3d-ready' }, '*');

window.addEventListener('message', e => {
  if (e.data?.type === 'demo3d-data') build(e.data.facades, e.data.legend);
});

// ── sprite label ──────────────────────────────────────────────────────────
function makeLabel(text, color) {
  const cv = document.createElement('canvas');
  cv.width = 200; cv.height = 40;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color + '22';
  ctx.fillRect(0, 0, 200, 40);
  ctx.strokeStyle = color + 'cc';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, 198, 38);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 100, 20);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sp  = new THREE.Sprite(mat);
  sp.scale.set(4, 0.8, 1);
  return sp;
}

// ── main build ────────────────────────────────────────────────────────────
function build(facades, legend) {
  const NF = facades?.NF, SF = facades?.SF, EF = facades?.EF, WF = facades?.WF;

  // Physical panel proportions: facade panels are taller than wide
  // SW = horizontal slot per column, SH = vertical slot per floor (floor height)
  const SW    = 0.40;   // horizontal spacing per panel column
  const SH    = 0.80;   // vertical spacing per floor (2× SW → panels are 2× taller than wide)
  const CW    = 0.36;   // panel face width  (SW - 0.04 gap)
  const CH    = 0.74;   // panel face height (SH - 0.06 gap)
  const DEPTH = 0.12;   // panel protrusion depth
  const UNCOLORED = new THREE.Color('#1b2a3a');

  // building half-dims
  const hW = Math.max(NF?.cols||0, SF?.cols||0) * SW / 2;
  const hD = Math.max(EF?.cols||0, WF?.cols||0) * SW / 2;
  const bH = Math.max(NF?.rows||0, SF?.rows||0, EF?.rows||0, WF?.rows||0) * SH;

  // ── scene (same look as builder3d.html) ──
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));

  const sun = new THREE.DirectionalLight(0xffd6a5, 1.3);
  sun.position.set(10, 20, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
  sun.shadow.camera.right = sun.shadow.camera.top   =  50;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x6699cc, 0.4);
  fill.position.set(-10, 5, -10);
  scene.add(fill);

  scene.add(new THREE.HemisphereLight(0x223355, 0x111a11, 0.3));

  scene.add(new THREE.GridHelper(80, 80, 0x1e2a38, 0x1a222e));

  const gnd = new THREE.Mesh(
    new THREE.PlaneGeometry(300, 300),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  gnd.rotation.x = -Math.PI / 2;
  gnd.receiveShadow = true;
  scene.add(gnd);

  // ── building core (structural slab / frame gaps) ──
  const coreBox = new THREE.Mesh(
    new THREE.BoxGeometry(hW * 2, bH, hD * 2),
    new THREE.MeshStandardMaterial({ color: 0x0c1520, roughness: 0.95 })
  );
  coreBox.position.set(0, bH / 2, 0);
  coreBox.receiveShadow = true;
  scene.add(coreBox);

  // Roof cap
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(hW * 2 + DEPTH * 2, DEPTH * 1.5, hD * 2 + DEPTH * 2),
    new THREE.MeshStandardMaterial({ color: 0x141e2c, roughness: 0.9 })
  );
  roof.position.set(0, bH + DEPTH * 0.75, 0);
  scene.add(roof);

  // ── panel instances ──────────────────────────────────────────────────
  // NS facades: BoxGeometry(CW, CH, DEPTH)  — depth protrudes in ±Z
  // EW facades: BoxGeometry(DEPTH, CH, CW)  — depth protrudes in ±X
  const panelMatNS = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.55, metalness: 0.08 });
  const panelMatEW = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.55, metalness: 0.08 });
  const geoNS = new THREE.BoxGeometry(CW, CH, DEPTH);
  const geoEW = new THREE.BoxGeometry(DEPTH, CH, CW);

  const nsCount = (NF ? NF.rows * NF.cols : 0) + (SF ? SF.rows * SF.cols : 0);
  const ewCount = (EF ? EF.rows * EF.cols : 0) + (WF ? WF.rows * WF.cols : 0);

  const dummy = new THREE.Object3D();
  const clr   = new THREE.Color();

  function fillFacade(iMesh, f, getXYZ) {
    let idx = iMesh._nextIdx || 0;
    for (let fi = 0; fi < f.rows; fi++) {
      for (let ci = 0; ci < f.cols; ci++) {
        const [px, py, pz] = getXYZ(fi, ci, f.rows, f.cols);
        dummy.position.set(px, py, pz);
        dummy.rotation.set(0, 0, 0);
        dummy.scale.set(1, 1, 1);
        dummy.updateMatrix();
        iMesh.setMatrixAt(idx, dummy.matrix);
        const c = f.grid[fi]?.[ci];
        c ? clr.set(c) : clr.copy(UNCOLORED);
        iMesh.setColorAt(idx, clr);
        idx++;
      }
    }
    iMesh._nextIdx = idx;
  }

  if (nsCount > 0) {
    const iMeshNS = new THREE.InstancedMesh(geoNS, panelMatNS, nsCount);
    iMeshNS.castShadow = true;
    iMeshNS.receiveShadow = true;
    scene.add(iMeshNS);

    // NF: panels at z = -(hD + DEPTH/2), columns → X, rows → Y
    if (NF) fillFacade(iMeshNS, NF, (fi, ci, rows, cols) => [
      ci * SW + SW/2 - cols * SW / 2,
      (rows - 1 - fi) * SH + SH/2,
      -(hD + DEPTH / 2)
    ]);
    // SF: panels at z = +(hD + DEPTH/2)
    if (SF) fillFacade(iMeshNS, SF, (fi, ci, rows, cols) => [
      ci * SW + SW/2 - cols * SW / 2,
      (rows - 1 - fi) * SH + SH/2,
      +(hD + DEPTH / 2)
    ]);

    iMeshNS.instanceMatrix.needsUpdate = true;
    if (iMeshNS.instanceColor) iMeshNS.instanceColor.needsUpdate = true;
  }

  if (ewCount > 0) {
    const iMeshEW = new THREE.InstancedMesh(geoEW, panelMatEW, ewCount);
    iMeshEW.castShadow = true;
    iMeshEW.receiveShadow = true;
    scene.add(iMeshEW);

    // EF: panels at x = +(hW + DEPTH/2), columns → Z, rows → Y
    if (EF) fillFacade(iMeshEW, EF, (fi, ci, rows, cols) => [
      +(hW + DEPTH / 2),
      (rows - 1 - fi) * SH + SH/2,
      ci * SW + SW/2 - cols * SW / 2
    ]);
    // WF: panels at x = -(hW + DEPTH/2)
    if (WF) fillFacade(iMeshEW, WF, (fi, ci, rows, cols) => [
      -(hW + DEPTH / 2),
      (rows - 1 - fi) * SH + SH/2,
      ci * SW + SW/2 - cols * SW / 2
    ]);

    iMeshEW.instanceMatrix.needsUpdate = true;
    if (iMeshEW.instanceColor) iMeshEW.instanceColor.needsUpdate = true;
  }

  // ── direction labels ──
  const ZONE_COLORS = { NF:'#2d65bd', SF:'#1a9458', EF:'#a07800', WF:'#6d35d9' };
  const labelDefs = [
    { text:'NORTH', x:0,     y:-1.4, z:-(hD+1.2), color: ZONE_COLORS.NF },
    { text:'SOUTH', x:0,     y:-1.4, z:+(hD+1.2), color: ZONE_COLORS.SF },
    { text:'EAST',  x:+(hW+1.2), y:-1.4, z:0,    color: ZONE_COLORS.EF },
    { text:'WEST',  x:-(hW+1.2), y:-1.4, z:0,    color: ZONE_COLORS.WF },
  ];
  labelDefs.forEach(({ text, x, y, z, color }) => {
    const sp = makeLabel(text, color);
    sp.position.set(x, y, z);
    scene.add(sp);
  });

  // ── renderer ──
  const wrap = document.getElementById('canvas-wrap');
  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  wrap.appendChild(renderer.domElement);

  // ── camera ──
  const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 2000);
  const dist = Math.max(hW, hD, bH) * 2.6;
  camera.position.set(dist * 0.7, bH * 0.6, dist * 0.7);

  // ── controls ──
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.06;
  controls.minDistance    = 0.5;
  controls.maxDistance    = 500;
  controls.target.set(0, bH / 2, 0);
  controls.update();

  // ── legend ──
  if (legend?.length) {
    const el = document.getElementById('leg-items');
    el.innerHTML = legend.map(l => `
      <div class="leg-row">
        <div class="leg-dot" style="background:${l.color};"></div>
        <div class="leg-lbl">${l.label}</div>
        <div class="leg-cnt">${l.count ?? ''}</div>
      </div>`).join('');
    document.getElementById('legend-panel').style.display = 'block';
  }

  // ── resize ──
  function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  document.getElementById('loading').style.display = 'none';

  // ── render loop ──
  (function loop() {
    requestAnimationFrame(loop);
    controls.update();
    renderer.render(scene, camera);
  })();
}
</script>
</body>
</html>
