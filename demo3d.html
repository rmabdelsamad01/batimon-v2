<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batimon — 3D Demo View</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0d1117; }

/* ── top bar ── */
#top-bar {
  position:fixed; top:0; left:0; right:0; height:46px; z-index:20;
  background:#161b22; border-bottom:1px solid #30363d;
  display:flex; align-items:center; padding:0 14px; gap:10px;
}
#top-title { font-size:13px; font-weight:700; color:#e6edf3; display:flex; align-items:center; gap:7px; flex:1; }
#top-title svg { flex-shrink:0; }
#mode-badge {
  font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:2px 8px; border-radius:20px; background:#1f3a1f; color:#3fb950; border:1px solid #238636;
}
#close-btn {
  background:#21262d; border:1px solid #30363d; color:#8b949e;
  font-size:13px; height:28px; padding:0 12px; border-radius:6px; cursor:pointer;
  display:flex; align-items:center; gap:5px; font-weight:600; transition:all .15s;
}
#close-btn:hover { background:#30363d; color:#e6edf3; }

/* ── canvas ── */
#canvas-wrap { position:fixed; top:46px; left:0; right:0; bottom:0; }
#canvas-wrap canvas { display:block; width:100%; height:100%; }

/* ── legend ── */
#legend-panel {
  position:fixed; top:62px; right:14px; z-index:10; display:none;
  background:#161b22; border:1px solid #30363d; border-radius:10px;
  padding:12px 14px; max-height:calc(100vh - 100px); overflow-y:auto; min-width:170px; max-width:220px;
}
#legend-panel::-webkit-scrollbar { width:4px; }
#legend-panel::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }
.leg-hd { font-size:9px; font-weight:700; color:#8b949e; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.leg-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
.leg-lbl { font-size:11px; color:#c9d1d9; font-weight:500; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.leg-cnt { font-size:10px; color:#8b949e; flex-shrink:0; }

/* ── hint ── */
#hint {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:10;
  font-size:10px; color:#484f58; background:#161b22; border:1px solid #21262d;
  padding:3px 14px; border-radius:20px; white-space:nowrap; pointer-events:none;
}

/* ── loading ── */
#loading {
  position:fixed; inset:0; background:#0d1117; z-index:50;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
.spin { width:32px; height:32px; border:3px solid #21262d; border-top-color:#a855f7; border-radius:50%; animation:sp .75s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }
.load-txt { font-size:12px; color:#484f58; }

/* ── no-scene info box ── */
#info-box {
  position:fixed; bottom:40px; left:14px; z-index:10; display:none;
  background:#161b22; border:1px solid #30363d; border-radius:8px;
  padding:9px 13px; font-size:10px; color:#8b949e; max-width:260px; line-height:1.5;
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="load-txt">Loading 3D view…</div></div>

<div id="top-bar">
  <div id="top-title">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    Demo — 3D View
    <span id="mode-badge" style="display:none;"></span>
  </div>
  <button id="close-btn" onclick="window._close3D()">✕ Close</button>
</div>

<div id="canvas-wrap"></div>

<div id="legend-panel">
  <div class="leg-hd">Legend</div>
  <div id="leg-items"></div>
</div>

<div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
<div id="info-box"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── global close ─────────────────────────────────────────────────────────── */
window._close3D = () => { window.parent.postMessage({ type:'demo3d-close' }, '*'); };

/* ── geometry factories (mirror builder3d.html) ─────────────────────────── */
const GEO = {
  box:      () => new THREE.BoxGeometry(1,1,1),
  sphere:   () => new THREE.SphereGeometry(0.6,32,24),
  cylinder: () => new THREE.CylinderGeometry(0.5,0.5,1.5,32),
  cone:     () => new THREE.ConeGeometry(0.6,1.5,32),
  pyramid:  () => new THREE.ConeGeometry(0.7,1.2,4),
  torus:    () => new THREE.TorusGeometry(0.6,0.22,16,60),
  plane:    () => new THREE.PlaneGeometry(2,2),
};

/* ── deserialize (mirror builder3d.html _deserializeObj) ─────────────────── */
function deserObj(od, panelColors) {
  if (od.isGroup || od.type === 'group') {
    const g = new THREE.Group();
    g.userData.elementId = od.elementId || '';
    if (od.position) g.position.fromArray(od.position);
    if (od.rotation) g.rotation.set(...od.rotation);
    if (od.scale)    g.scale.fromArray(od.scale);
    (od.children || []).forEach(cd => {
      const c = deserObj(cd, panelColors);
      if (c) g.add(c);
    });
    return g;
  }
  if (!GEO[od.type]) return null;

  const eid = (od.elementId || '').trim();
  let color = od.color || '#0ea5e9';
  if (eid) {
    color = panelColors[eid] || '#374151'; // has ID but no demo color → slate
  }

  const geo = GEO[od.type]();
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    roughness: 0.55,
    metalness: 0.1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow    = true;
  mesh.receiveShadow = true;
  mesh.userData.elementId = eid;
  if (od.position) mesh.position.fromArray(od.position);
  if (od.rotation) mesh.rotation.set(...od.rotation);
  if (od.scale)    mesh.scale.fromArray(od.scale);
  return mesh;
}

/* ── shared Three.js setup ────────────────────────────────────────────────── */
function createScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);

  // Lights (same as builder3d.html)
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffd6a5, 1.3);
  sun.position.set(10, 20, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = sun.shadow.camera.bottom = -30;
  sun.shadow.camera.right = sun.shadow.camera.top  =  30;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x6699cc, 0.4);
  fill.position.set(-10, 5, -10);
  scene.add(fill);
  scene.add(new THREE.HemisphereLight(0x223355, 0x111a11, 0.3));

  // Grid (same as builder3d.html)
  const grid = new THREE.GridHelper(60, 60, 0x1e2a38, 0x1a222e);
  scene.add(grid);

  // Shadow ground (same as builder3d.html)
  const gnd = new THREE.Mesh(
    new THREE.PlaneGeometry(300, 300),
    new THREE.ShadowMaterial({ opacity: 0.25 })
  );
  gnd.rotation.x    = -Math.PI / 2;
  gnd.receiveShadow = true;
  scene.add(gnd);

  return scene;
}

function createRenderer(wrap) {
  const r = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  r.setPixelRatio(Math.min(devicePixelRatio, 2));
  r.shadowMap.enabled = true;
  r.shadowMap.type    = THREE.PCFSoftShadowMap;
  wrap.appendChild(r.domElement);
  return r;
}

function createCamera() {
  return new THREE.PerspectiveCamera(55, 1, 0.01, 5000);
}

function createControls(camera, domEl) {
  const c = new OrbitControls(camera, domEl);
  c.enableDamping  = true;
  c.dampingFactor  = 0.06;
  c.minDistance    = 0.3;
  c.maxDistance    = 800;
  return c;
}

function fitCamera(allObjects, camera, controls) {
  const box = new THREE.Box3();
  allObjects.forEach(o => box.expandByObject(o));
  if (box.isEmpty()) return;
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov    = camera.fov * (Math.PI / 180);
  const dist   = Math.abs(maxDim / Math.sin(fov / 2)) * 0.65;
  camera.position.set(center.x + dist * 0.65, center.y + dist * 0.5, center.z + dist * 0.65);
  controls.target.copy(center);
  controls.update();
}

function startLoop(renderer, scene, camera, controls, wrap) {
  function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);
  (function loop() {
    requestAnimationFrame(loop);
    controls.update();
    renderer.render(scene, camera);
  })();
}

function buildLegend(legend) {
  if (!legend?.length) return;
  const el = document.getElementById('leg-items');
  el.innerHTML = legend.map(l => `
    <div class="leg-row">
      <div class="leg-dot" style="background:${l.color};"></div>
      <div class="leg-lbl">${l.label}</div>
      <div class="leg-cnt">${l.count ?? ''}</div>
    </div>`).join('');
  document.getElementById('legend-panel').style.display = 'block';
}

/* ── MODE A: builder3d scene ─────────────────────────────────────────────── */
function buildFromScene(sceneData, panelColors, legend) {
  const wrap   = document.getElementById('canvas-wrap');
  const scene  = createScene();
  const renderer = createRenderer(wrap);
  const camera   = createCamera();
  const controls = createControls(camera, renderer.domElement);

  camera.position.set(7, 5, 7);
  controls.target.set(0, 0, 0);
  controls.update();

  const allObjs = [];
  (sceneData.objects || []).forEach(od => {
    const obj = deserObj(od, panelColors);
    if (!obj) return;
    scene.add(obj);
    allObjs.push(obj);
  });

  if (allObjs.length) fitCamera(allObjs, camera, controls);

  // Badge + info
  const badge = document.getElementById('mode-badge');
  badge.textContent = '3D Builder Scene';
  badge.style.display = 'inline-flex';

  const assigned = Object.keys(panelColors).length;
  if (assigned > 0) {
    const ib = document.getElementById('info-box');
    ib.innerHTML = `<strong style="color:#c9d1d9;">${assigned}</strong> panels coloured from demo legend.<br>Objects without a panel ID keep their original colour.`;
    ib.style.display = 'block';
  }

  buildLegend(legend);
  startLoop(renderer, scene, camera, controls, wrap);
}

/* ── MODE B: auto-generated building ─────────────────────────────────────── */
function makeFacadeCanvas(facade) {
  const { rows, cols, grid } = facade;
  const CELL = 14, GAP = 2;
  const cw = Math.max(cols * (CELL + GAP) - GAP, 2);
  const ch = Math.max(rows * (CELL + GAP) - GAP, 2);
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, cw, ch);
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      ctx.fillStyle = grid[r]?.[c] || '#1f2937';
      ctx.fillRect(c*(CELL+GAP), r*(CELL+GAP), CELL, CELL);
    }
  return cv;
}

function buildAutoGenerated(facades, legend) {
  const wrap     = document.getElementById('canvas-wrap');
  const scene    = createScene();
  const renderer = createRenderer(wrap);
  const camera   = createCamera();
  const controls = createControls(camera, renderer.domElement);

  const NF = facades.NF, SF = facades.SF, EF = facades.EF, WF = facades.WF;
  const S  = 0.5;
  const bW = Math.max(NF?.cols||33, SF?.cols||33) * S;
  const bD = Math.max(EF?.cols||15, WF?.cols||15) * S;

  const defs = [
    { key:'NF', d:NF, posX:0,     posZ:-bD/2, rotY:Math.PI    },
    { key:'SF', d:SF, posX:0,     posZ:+bD/2, rotY:0           },
    { key:'EF', d:EF, posX:+bW/2, posZ:0,     rotY:-Math.PI/2  },
    { key:'WF', d:WF, posX:-bW/2, posZ:0,     rotY:+Math.PI/2  },
  ];

  const allObjs = [];
  defs.forEach(fc => {
    if (!fc.d) return;
    const fW  = fc.d.cols * S;
    const fH  = fc.d.rows * S;
    const tex = new THREE.CanvasTexture(makeFacadeCanvas(fc.d));
    tex.flipY = false;
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.LinearFilter;
    const geo  = new THREE.PlaneGeometry(fW, fH);
    const mat  = new THREE.MeshStandardMaterial({ map:tex, roughness:0.75, metalness:0.05 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(fc.posX, fH/2, fc.posZ);
    mesh.rotation.y = fc.rotY;
    scene.add(mesh);
    allObjs.push(mesh);
  });

  if (allObjs.length) fitCamera(allObjs, camera, controls);

  const badge = document.getElementById('mode-badge');
  badge.textContent = 'Auto-generated';
  badge.style.color = '#d29922';
  badge.style.background = '#272115';
  badge.style.borderColor = '#9e6a03';
  badge.style.display = 'inline-flex';

  const ib = document.getElementById('info-box');
  ib.innerHTML = 'No 3D Builder scene found.<br>Showing an auto-generated view.<br><span style="color:#6e7681;">Build a scene in the 3D Builder and link panels with Element IDs to see a real model here.</span>';
  ib.style.display = 'block';

  buildLegend(legend);
  startLoop(renderer, scene, camera, controls, wrap);
}

/* ── message listener ────────────────────────────────────────────────────── */
window.parent.postMessage({ type:'demo3d-ready' }, '*');

window.addEventListener('message', e => {
  if (e.data?.type !== 'demo3d-data') return;
  const { sceneData, panelColors, legend, facades } = e.data;
  document.getElementById('loading').style.display = 'none';
  if (sceneData?.objects?.length) {
    buildFromScene(sceneData, panelColors || {}, legend);
  } else {
    buildAutoGenerated(facades, legend);
  }
});
</script>
</body>
</html>
