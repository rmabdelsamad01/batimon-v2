<title>Batimon — Demo 3D View</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
#wrap { width:100%; height:100%; display:flex; flex-direction:column; }
#top-bar {
  height:46px; flex-shrink:0;
  background:var(--surface,#f6f8fa); border-bottom:1px solid var(--border,#d0d7de);
  display:flex; align-items:center; padding:0 14px; gap:10px; flex-wrap:wrap;
}
#top-title { font-size:13px; font-weight:700; color:var(--text,#1a3d72); display:flex; align-items:center; gap:7px; }
#close-btn {
  margin-left:auto; background:#21262d; border:1px solid #30363d; color:#c9d1d9;
  font-size:12px; height:28px; padding:0 14px; border-radius:6px; cursor:pointer;
  font-weight:600; transition:all .15s; flex-shrink:0;
}
#close-btn:hover { background:#30363d; color:#fff; }
#legend-wrap { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.leg-dot { width:11px; height:11px; border-radius:2px; border:1px solid rgba(0,0,0,0.12); flex-shrink:0; }
.leg-item { display:flex; align-items:center; gap:4px; }
.leg-lbl { font-size:10px; color:#8099b0; white-space:nowrap; }
#vp {
  flex:1; min-height:0; overflow:hidden;
  background:radial-gradient(ellipse at 50% 40%,#cde8f8 0%,#a8d4ef 100%);
  position:relative; cursor:grab; user-select:none;
}
#scene { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; perspective:1400px; perspective-origin:50% 48%; }
#bld { position:relative; width:0; height:0; transform-style:preserve-3d; transform:rotateX(-22deg) rotateY(30deg); }
#hint {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); color:#6b7f96;
  font-size:11px; padding:5px 16px; border-radius:20px;
  pointer-events:none; white-space:nowrap; letter-spacing:0.03em;
}
</style>
</head>

  'R+18B':['C1704','R1751','R1751','R1754','R1752','R1751','R1753','R1752','R1754','R1752','R1756','R1751','R1753','R1752','R1754','R1752','C1703'],

// ── Signal ready ──────────────────────────────────────────────────────────────
window.parent.postMessage({type:'demo3d-ready'},'*');
window.addEventListener('message',e=>{
  if(e.data?.type==='demo3d-data') build(e.data.panelColors||{},e.data.legend||[]);
});

// ── Build ─────────────────────────────────────────────────────────────────────
function build(panelColors,legend){
  const CELL=7,GAP=1,JOINT='#07111e',BASE_H=150,BASE_W=50;
  const TABLE_ROW_H={'R+34':166,'R+18T':25,'R+18M':50,'R+18MD':110,'R+18B':40,'R+17T':50,'R+17B':100};
  const STRUCT_FLOORS=new Set(['R+18M','R+18MD','R+18B']);
  const STRUCT_CLR='#1c1000';
  const UNCOLORED='#8a9bac';

  function rowPx(fl){return Math.max(2,Math.round((TABLE_ROW_H[fl]||BASE_H)*CELL/BASE_W));}
  function totalH(floors){return floors.reduce((s,fl)=>s+rowPx(fl),0)+(floors.length-1)*GAP;}
  function colsW(n){return n*CELL+(n-1)*GAP;}

  const sfCols3D=SF_COLS.filter(c=>c!=='15-A'&&c!=='15-B');
  const wfCols3D=WF_COLS.filter(c=>c!=='15-A');
  const sfTypes3D={},wfTypes3D={};
  SF_FLOORS.forEach(fl=>{sfTypes3D[fl]=(SF_TYPES[fl]||[]).slice(2);});
  WF_FLOORS.forEach(fl=>{wfTypes3D[fl]=(WF_TYPES[fl]||[]).slice(0,-1);});

  const sfW=colsW(sfCols3D.length),nfW=colsW(NF_COLS.length);
  const efW=colsW(EF_COLS.length),wfW=colsW(wfCols3D.length);
  const fH=totalH(SF_FLOORS);
  const W=Math.max(sfW,nfW),D=Math.max(efW,wfW);

  function faceGrid(zid,cols,floors,types,extraRowH,merges){
    function rPx(fl){
      if(extraRowH&&extraRowH[fl]!=null)return Math.max(2,Math.round(extraRowH[fl]*CELL/BASE_W));
      return rowPx(fl);
    }
    const rH=floors.map(rPx);
    const w=colsW(cols.length);
    const h=rH.reduce((s,v)=>s+v,0)+(floors.length-1)*GAP;
    let cells='';
    floors.forEach((fl)=>{
      const isStruct=STRUCT_FLOORS.has(fl);
      cols.forEach((col,ci)=>{
        const type=(types[fl]||[])[ci]||'';
        let s;
        if(isStruct) s=`background:${STRUCT_CLR};`;
        else if(!type) s=`background:${JOINT};`;
        else{const clr=panelColors[`${zid}-${fl}-C${col}`]||UNCOLORED;s=`background:${clr};`;}
        cells+=`<div style="${s}"></div>`;
      });
    });
    const colT=Array(cols.length).fill(`${CELL}px`).join(' ');
    const rowT=rH.map(v=>`${v}px`).join(' ');
    const grid=`<div style="display:grid;grid-template-columns:${colT};grid-template-rows:${rowT};gap:${GAP}px;background:${JOINT};width:${w}px;height:${h}px;">${cells}</div>`;
    if(!merges||!merges.length)return grid;
    const rowTops={};let _y=0;
    floors.forEach((fl,fi)=>{rowTops[fl]=_y;_y+=rH[fi]+GAP;});
    const colLefts={};let _x=0;
    cols.forEach(col=>{colLefts[String(col)]=_x;_x+=CELL+GAP;});
    let ovl='';
    merges.forEach(m=>{
      const fi1=floors.indexOf(m.fl1),fi2=floors.indexOf(m.fl2);
      if(fi1<0||fi2<0)return;
      const mH=rH[fi1]+GAP+rH[fi2],top=rowTops[m.fl1];
      m.mCols.forEach(col=>{
        const left=colLefts[String(col)];if(left==null)return;
        const clr=panelColors[`${zid}-${m.fl1}-C${col}`]||UNCOLORED;
        ovl+=`<div style="position:absolute;left:${left}px;top:${top}px;width:${CELL}px;height:${mH}px;background:${clr};"></div>`;
      });
    });
    return`<div style="position:relative;width:${w}px;height:${h}px;">${grid}${ovl}</div>`;
  }

  function face(id,transform,w,shade,label,labelColor,content){
    const overlay=shade>0?`<div style="position:absolute;inset:0;background:rgba(0,0,0,${shade});pointer-events:none;"></div>`:'';
    const lbl=`<div style="position:absolute;bottom:0;left:0;right:0;padding:3px 0;text-align:center;font-size:9px;font-weight:800;letter-spacing:0.2em;color:${labelColor};background:rgba(0,0,0,0.6);pointer-events:none;text-transform:uppercase;">${label}</div>`;
    return`<div id="${id}" style="position:absolute;width:${w}px;height:${fH}px;left:${-w/2}px;top:${-fH/2}px;transform:${transform};backface-visibility:hidden;overflow:hidden;outline:1px solid rgba(255,255,255,0.11);">${content}${overlay}${lbl}</div>`;
  }

  const SR01={'R+01':25},SR02={'R+02':50};

  // NF (split col 0-11 = small R+01, col 12+ = small R+02)
  const nfSm=NF_COLS.slice(0,12),nfNm=NF_COLS.slice(12);
  const nfTSm={},nfTNm={};
  NF_FLOORS.forEach(fl=>{const r=NF_TYPES[fl]||[];nfTSm[fl]=r.slice(0,12);nfTNm[fl]=r.slice(12);});
  const nfGrid=`<div style="width:${nfW}px;height:${fH}px;background:${JOINT};display:flex;gap:${GAP}px;align-items:flex-start;">`
    +faceGrid('NF',nfSm,NF_FLOORS,nfTSm,SR01,[{fl1:'R+02',fl2:'R+01',mCols:[60,59,58]}])
    +faceGrid('NF',nfNm,NF_FLOORS,nfTNm,SR02)
    +'</div>';

  // SF (split col 0-14 = small R+02, col 15+ = normal)
  const sfSm=sfCols3D.slice(0,15),sfNm=sfCols3D.slice(15);
  const sfTSm={},sfTNm={};
  SF_FLOORS.forEach(fl=>{const r=sfTypes3D[fl]||[];sfTSm[fl]=r.slice(0,15);sfTNm[fl]=r.slice(15);});
  const sfGrid=`<div style="width:${sfW}px;height:${fH}px;background:${JOINT};display:flex;gap:${GAP}px;align-items:flex-start;">`
    +faceGrid('SF',sfSm,SF_FLOORS,sfTSm,SR02)
    +faceGrid('SF',sfNm,SF_FLOORS,sfTNm)
    +'</div>';

  // EF (split col 0-2 = normal, col 3+ = small R+01)
  const efNm=EF_COLS.slice(0,3),efSm=EF_COLS.slice(3);
  const efTNm={},efTSm={};
  EF_FLOORS.forEach(fl=>{const r=EF_TYPES[fl]||[];efTNm[fl]=r.slice(0,3);efTSm[fl]=r.slice(3);});
  const efGrid=`<div style="width:${efW}px;height:${fH}px;background:${JOINT};display:flex;gap:${GAP}px;align-items:flex-start;">`
    +faceGrid('EF',efNm,EF_FLOORS,efTNm)
    +faceGrid('EF',efSm,EF_FLOORS,efTSm,SR01,[{fl1:'R+02',fl2:'R+01',mCols:[75,74,73,71,70,69]}])
    +'</div>';

  // WF
  const wfGrid=faceGrid('WF',wfCols3D,WF_FLOORS,wfTypes3D,SR02);

  const roof=`<div style="position:absolute;width:${W}px;height:${D}px;left:${-W/2}px;top:${-D/2}px;transform:rotateX(90deg) translateZ(${fH/2}px);backface-visibility:hidden;background:linear-gradient(135deg,#1e2f45,#111c2a);outline:1px solid rgba(255,255,255,0.1);"></div>`;
  const gW=W*2.4,gD=D*2.4;
  const ground=`<div style="position:absolute;width:${gW}px;height:${gD}px;left:${-gW/2}px;top:${-gD/2}px;transform:rotateX(90deg) translateZ(${-fH/2}px);backface-visibility:hidden;background:radial-gradient(ellipse at center,rgba(14,101,169,0.12) 0%,transparent 68%);"></div>`;

  document.getElementById('bld').innerHTML=
    face('d3-front',`translateZ(${D/2}px)`,nfW,0,'North','#60a5fa',nfGrid)
    +face('d3-back',`rotateY(180deg) translateZ(${D/2}px)`,sfW,0.18,'South','#4ade80',sfGrid)
    +face('d3-east',`rotateY(-90deg) translateZ(${W/2}px)`,efW,0.28,'East','#fbbf24',efGrid)
    +face('d3-west',`rotateY(90deg) translateZ(${W/2}px)`,wfW,0.42,'West','#c084fc',wfGrid)
    +roof+ground;

  if(legend.length){
    document.getElementById('legend-wrap').innerHTML=legend.map(l=>`
      <div class="leg-item">
        <div class="leg-dot" style="background:${l.color};"></div>
        <span class="leg-lbl">${l.label}${l.count!=null?' ('+l.count+')':''}</span>
      </div>`).join('');
  }

  // Interaction (identical to renderAAAPage)
  const bld=document.getElementById('bld'),vp=document.getElementById('vp');
  let rotX=-22,rotY=30,zoom=1,panX=0,panY=0,dragging=false,lastX=0,lastY=0;
  function applyT(){bld.style.transform=`translate(${panX}px,${panY}px) scale(${zoom}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;}
  vp.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    dragging=true;lastX=e.clientX;lastY=e.clientY;
    vp.style.cursor=e.shiftKey?'grabbing':'move';e.preventDefault();
  });
  window.addEventListener('mouseup',()=>{dragging=false;if(vp.isConnected)vp.style.cursor='grab';});
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=e.clientX-lastX,dy=e.clientY-lastY;
    if(e.shiftKey&&e.buttons===1){rotY+=dx*0.4;rotX-=dy*0.4;rotX=Math.max(-88,Math.min(88,rotX));}
    else{panX+=dx;panY+=dy;}
    lastX=e.clientX;lastY=e.clientY;applyT();
  });
  vp.addEventListener('wheel',e=>{
    e.preventDefault();zoom*=e.deltaY<0?1.08:0.93;zoom=Math.max(0.1,Math.min(7,zoom));applyT();
  },{passive:false});
  let lastPinch=0;
  vp.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
    if(e.touches.length===2)lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:false});
  vp.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      panX+=e.touches[0].clientX-lastX;panY+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;applyT();
    }else if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(lastPinch){zoom*=d/lastPinch;zoom=Math.max(0.1,Math.min(7,zoom));applyT();}
      lastPinch=d;
    }
  },{passive:false});
}
